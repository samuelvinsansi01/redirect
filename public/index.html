<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figma Redirect — Gerador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c0f;
      --surface: #141418;
      --border: #222228;
      --accent: #b8f059;
      --accent-dim: rgba(184,240,89,0.12);
      --text: #f0f0f0;
      --muted: #555560;
      --error: #ff5c5c;
      --radius: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.35;
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-dim);
      border: 1px solid rgba(184,240,89,0.25);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      padding: 4px 10px;
      border-radius: 100px;
      margin-bottom: 20px;
    }
    .badge-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 6px;
      letter-spacing: -0.03em;
    }
    h1 span { color: var(--accent); }

    .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 32px;
      letter-spacing: 0.04em;
    }

    .fields { display: flex; flex-direction: column; gap: 16px; }

    .field-group { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    label .tag {
      background: var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.08em;
    }

    input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 13px 16px;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input::placeholder { color: var(--muted); }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(184,240,89,0.08);
    }
    input.error-field { border-color: var(--error); }

    .field-hint {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      opacity: 0.7;
      min-height: 16px;
      letter-spacing: 0.04em;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0;
      color: var(--muted);
      font-size: 11px;
      font-family: 'DM Mono', monospace;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn {
      margin-top: 8px;
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: #0c0c0f;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #0c0c0f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-box {
      display: none;
      margin-top: 20px;
      background: var(--accent-dim);
      border: 1px solid rgba(184,240,89,0.2);
      border-radius: var(--radius);
      padding: 16px;
    }
    .result-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .result-url {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      word-break: break-all;
      margin-bottom: 12px;
    }
    .copy-btn {
      background: var(--accent);
      color: #0c0c0f;
      border: none;
      border-radius: 6px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.06em;
      padding: 7px 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .copy-btn:hover { opacity: 0.85; }

    .error-msg {
      display: none;
      margin-top: 12px;
      color: var(--error);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
    }

    .footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-text {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .footer-icons { display: flex; gap: 12px; }
    .icon-tag {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      background: var(--border);
      padding: 3px 7px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">
      <div class="badge-dot"></div>
      FIGMA REDIRECT
    </div>

    <h1>Gere seu link<br><span>inteligente.</span></h1>
    <p class="subtitle">// detecta dispositivo → redireciona automaticamente</p>

    <div class="fields">
      <div class="field-group">
        <label>Nome da Empresa <span class="tag">ALIAS</span></label>
        <input type="text" id="companyName" placeholder="Ex: Contabilidade America" />
        <span class="field-hint" id="aliasPreview"></span>
      </div>

      <div class="divider">—</div>

      <div class="field-group">
        <label>Link Desktop <span class="tag">FIGMA</span></label>
        <input type="url" id="deskUrl" placeholder="https://www.figma.com/proto/..." />
      </div>

      <div class="divider">↕</div>

      <div class="field-group">
        <label>Link Mobile <span class="tag">FIGMA</span></label>
        <input type="url" id="mobUrl" placeholder="https://www.figma.com/proto/..." />
      </div>
    </div>

    <button class="btn" id="generateBtn" onclick="generate()">
      <div class="btn-inner">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Gerar link TinyURL</span>
      </div>
    </button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="result-box" id="resultBox">
      <div class="result-label">// LINK GERADO</div>
      <div class="result-url" id="resultUrl"></div>
      <button class="copy-btn" onclick="copyUrl()">Copiar link</button>
    </div>

    <div class="footer">
      <span class="footer-text">tinyurl.com/***-vin</span>
      <div class="footer-icons">
        <span class="icon-tag">DESKTOP</span>
        <span class="icon-tag">MOBILE</span>
      </div>
    </div>
  </div>

  <script>
    function normalizeAlias(name) {
      return name
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .slice(0, 50);
    }

    // Preview do alias em tempo real
    document.getElementById('companyName').addEventListener('input', function () {
      const preview = document.getElementById('aliasPreview');
      const val = this.value.trim();
      if (val) {
        preview.textContent = `→ tinyurl.com/${normalizeAlias(val)}-vin`;
      } else {
        preview.textContent = '';
      }
    });

    function extractFigmaId(url) {
      try {
        const u = new URL(url);
        return u.searchParams.get('node-id');
      } catch {
        return null;
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }

    function setLoading(val) {
      const btn = document.getElementById('generateBtn');
      const spinner = document.getElementById('spinner');
      const text = document.getElementById('btnText');
      btn.disabled = val;
      spinner.style.display = val ? 'block' : 'none';
      text.textContent = val ? 'Gerando...' : 'Gerar link TinyURL';
    }

    async function generate() {
      hideError();
      document.getElementById('resultBox').style.display = 'none';

      const companyName = document.getElementById('companyName').value.trim();
      const deskUrl = document.getElementById('deskUrl').value.trim();
      const mobUrl = document.getElementById('mobUrl').value.trim();

      if (!companyName) {
        showError('// informe o nome da empresa');
        document.getElementById('companyName').classList.add('error-field');
        return;
      }

      const deskId = extractFigmaId(deskUrl);
      const mobId = extractFigmaId(mobUrl);

      if (!deskId) {
        showError('// link desktop inválido ou sem node-id');
        document.getElementById('deskUrl').classList.add('error-field');
        return;
      }
      if (!mobId) {
        showError('// link mobile inválido ou sem node-id');
        document.getElementById('mobUrl').classList.add('error-field');
        return;
      }

      document.getElementById('companyName').classList.remove('error-field');
      document.getElementById('deskUrl').classList.remove('error-field');
      document.getElementById('mobUrl').classList.remove('error-field');

      setLoading(true);

      try {
        const res = await fetch('/api/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ deskId, mobId, companyName }),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(`// ${data.error}`);
          return;
        }

        document.getElementById('resultUrl').textContent = data.shortUrl;
        document.getElementById('resultBox').style.display = 'block';

      } catch (err) {
        showError('// falha na conexão com o servidor');
      } finally {
        setLoading(false);
      }
    }

    function copyUrl() {
      const url = document.getElementById('resultUrl').textContent;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = 'Copiado ✓';
        setTimeout(() => btn.textContent = 'Copiar link', 2000);
      });
    }

    // Enter para gerar
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') generate();
    });
  </script>
</body>
</html>
